name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  python-package:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m pip install ./python

      - name: Run unit tests
        run: python -m unittest discover -s python/tests -p "test_*.py" -v

      - name: Build Python package
        run: python -m build ./python

  worker-dry-run:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Validate Worker bundle
        run: npx -y wrangler@4.71.0 deploy --config src/wrangler.jsonc --dry-run
