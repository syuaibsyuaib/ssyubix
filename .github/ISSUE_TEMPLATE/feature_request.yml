name: Feature request
description: Propose an improvement to the protocol, client package, or docs.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What use case or pain point are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the change you would like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or alternate designs have you already tried?
  - type: dropdown
    id: scope
    attributes:
      label: Primary area
      options:
        - Worker backend
        - MCP tools
        - Python packaging
        - Developer experience
        - Documentation
