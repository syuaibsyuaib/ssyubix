name: Bug report
description: Report a reproducible bug in the Worker, MCP server, or packaging flow.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A clear summary of the bug.
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Affected component
      options:
        - Cloudflare Worker
        - Python MCP package
        - Packaging and release
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Share the smallest sequence that reproduces the problem.
      placeholder: |
        1. Register an agent
        2. Join a room
        3. Send a message
        4. Observe the failure
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Python version, client, and relevant deployment details.
      placeholder: Windows 11, Python 3.11, Codex desktop, Worker deployed on Cloudflare Free plan
